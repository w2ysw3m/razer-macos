name: Native macOS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.4.14"
        required: true
        type: string
      tag:
        description: "Release tag. Defaults to v<version>."
        required: false
        type: string
      draft:
        description: "Create the GitHub Release as a draft"
        required: false
        default: false
        type: boolean
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-release:
    name: Build signed macOS release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve release metadata
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
            tag="${{ inputs.tag }}"
            if [[ -z "$tag" ]]; then
              tag="v$version"
            fi
            draft="${{ inputs.draft }}"
            prerelease="${{ inputs.prerelease }}"
          else
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
            draft="false"
            prerelease="false"
          fi

          echo "APP_VERSION=$version" >>"$GITHUB_ENV"
          echo "RELEASE_TAG=$tag" >>"$GITHUB_ENV"
          echo "RELEASE_DRAFT=$draft" >>"$GITHUB_ENV"
          echo "RELEASE_PRERELEASE=$prerelease" >>"$GITHUB_ENV"

      - name: Import Developer ID certificate
        shell: bash
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "$MACOS_CERTIFICATE_P12_BASE64" || -z "$MACOS_CERTIFICATE_PASSWORD" ]]; then
            echo "MACOS_CERTIFICATE_P12_BASE64 and MACOS_CERTIFICATE_PASSWORD secrets are required." >&2
            exit 1
          fi

          cert_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/app-signing.keychain-db"
          keychain_password="$(openssl rand -base64 32)"

          printf '%s' "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode >"$cert_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$cert_path" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$keychain_path" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
          security find-identity -p codesigning -v

      - name: Prepare notarization API key
        shell: bash
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          if [[ -z "$APPLE_API_KEY_BASE64" || -z "$APPLE_API_KEY_ID" || -z "$APPLE_API_ISSUER_ID" ]]; then
            echo "APPLE_API_KEY_BASE64, APPLE_API_KEY_ID, and APPLE_API_ISSUER_ID secrets are required." >&2
            exit 1
          fi

          api_key_path="$RUNNER_TEMP/AuthKey_$APPLE_API_KEY_ID.p8"
          printf '%s' "$APPLE_API_KEY_BASE64" | base64 --decode >"$api_key_path"
          chmod 600 "$api_key_path"
          echo "APPLE_API_KEY_PATH=$api_key_path" >>"$GITHUB_ENV"
          echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID" >>"$GITHUB_ENV"
          echo "APPLE_API_ISSUER_ID=$APPLE_API_ISSUER_ID" >>"$GITHUB_ENV"

      - name: Test
        run: swift test --package-path NativeRazerMacOS

      - name: Package signed and notarized app
        shell: bash
        env:
          MACOS_SIGNING_MODE: required
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          MACOS_NOTARIZE: "1"
        run: ./script/package_native.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-macos-release-${{ env.APP_VERSION }}
          path: |
            dist/release/*.zip
            dist/release/*.dmg
            dist/release/SHA256SUMS.txt
          if-no-files-found: error

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          notes_file="$RUNNER_TEMP/release-notes.md"
          cat >"$notes_file" <<NOTES
          Native macOS release artifacts for Razer macOS $APP_VERSION.

          Assets:
          - Native app zip
          - Native app disk image
          - SHA256 checksums

          The app is Developer ID signed and notarized by the release workflow.
          NOTES

          args=()
          if [[ "$RELEASE_DRAFT" == "true" ]]; then
            args+=(--draft)
          fi
          if [[ "$RELEASE_PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/release/* --clobber
            gh release edit "$RELEASE_TAG" \
              --title "Razer macOS $APP_VERSION" \
              --notes-file "$notes_file" \
              "${args[@]}"
          else
            gh release create "$RELEASE_TAG" dist/release/* \
              --target "$GITHUB_SHA" \
              --title "Razer macOS $APP_VERSION" \
              --notes-file "$notes_file" \
              "${args[@]}"
          fi
